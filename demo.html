<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StabFX Tex</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
touch-action:none;
}

/* FPS */

.fps{
position:fixed;
top:10px;
left:10px;
color:#0f0;
font-size:18px;
}

/* menu */

.menu{
position:fixed;
top:10px;
right:15px;
font-size:70px;
color:white;
}

/* celular */

.phone{
position:absolute;
top:50%;
left:50%;
width:230px;
height:430px;
background:#ddd;
border-radius:35px;

/* gira perto da camera */
transform-origin:50% 15%;

transform:translate(-50%,-50%) rotate(0deg);
}

/* modulo camera */

.cameraModule{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
width:70px;
height:130px;
background:#aaa;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
padding-top:10px;
}

/* lentes */

.lens{
width:35px;
height:35px;
background:black;
border-radius:50%;
}

.stabCam{
transform-origin:center;
}

/* joystick */

.joystick{
position:fixed;
width:220px;
height:220px;
background:rgba(255,255,255,0.08);
border-radius:50%;
display:none;
}

.stick{
position:absolute;
width:90px;
height:90px;
background:white;
border-radius:50%;
left:65px;
top:65px;
box-shadow:0 0 25px white;
}

</style>
</head>

<body>

<div class="fps" id="fps">FPS: 0</div>

<div class="menu">⋮</div>

<div class="phone" id="phone">

<div class="cameraModule">

<div class="lens"></div>
<div class="lens"></div>
<div class="lens stabCam" id="camera"></div>

</div>

</div>

<div class="joystick" id="joy">
<div class="stick" id="stick"></div>
</div>

<script>

let phone=document.getElementById("phone")
let camera=document.getElementById("camera")

let joy=document.getElementById("joy")
let stick=document.getElementById("stick")

let startX=0
let startY=0
let rotation=0

/* JOYSTICK */

document.addEventListener("touchstart",(e)=>{

let t=e.touches[0]

startX=t.clientX
startY=t.clientY

joy.style.left=(t.clientX-110)+"px"
joy.style.top=(t.clientY-110)+"px"
joy.style.display="block"

})

document.addEventListener("touchmove",(e)=>{

let t=e.touches[0]

let dx=t.clientX-startX
let dy=t.clientY-startY

rotation -= dx*0.2

phone.style.transform =
`translate(-50%,-50%) rotate(${rotation}deg)`

camera.style.transform =
`rotate(${-rotation}deg)`

/* limite circular */

let limit=60

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist>limit){

dx=dx/dist*limit
dy=dy/dist*limit

}

stick.style.left=(65+dx)+"px"
stick.style.top=(65+dy)+"px"

})

document.addEventListener("touchend",()=>{

joy.style.display="none"

stick.style.left="65px"
stick.style.top="65px"

})

/* FPS COUNTER */

let frames=0
let last=performance.now()

function fpsLoop(){

frames++

let now=performance.now()

if(now-last>=1000){

document.getElementById("fps").innerText="FPS: "+frames

frames=0
last=now

}

requestAnimationFrame(fpsLoop)

}

fpsLoop()

</script>

</body>
</html>
